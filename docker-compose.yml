services:
  postgres:
    image: postgres:16
    container_name: task_management_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task_management_db}
      POSTGRES_USER: ${POSTGRES_USER:-task_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-task_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
